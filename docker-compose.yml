## docker-compose.yml — ambiente de DESENVOLVIMENTO
##
## Uso:
##   cp .env.example .env
##   docker compose up -d
##
## Codigo montado via bind mount (edite no host, reflete no container
## imediatamente). vendor/ e node_modules/ usam volumes nomeados para
## nao serem sobrescritos pelo bind mount da raiz do projeto.

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            target: development
        container_name: saire_app
        restart: unless-stopped
        working_dir: /var/www/html
        env_file:
            - .env
        volumes:
            - .:/var/www/html
            - vendor_data:/var/www/html/vendor
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - saire

    webserver:
        image: nginx:1.27-alpine
        container_name: saire_nginx
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8000}:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - saire

    node:
        image: node:20-alpine
        container_name: saire_node
        restart: unless-stopped
        working_dir: /var/www/html
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        env_file:
            - .env
        volumes:
            - .:/var/www/html
            - node_modules_data:/var/www/html/node_modules
        ports:
            - "${VITE_PORT:-5173}:5173"
        networks:
            - saire

    mysql:
        build:
            context: ./docker/mysql
            dockerfile: Dockerfile
        container_name: saire_mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
            MYSQL_DATABASE: ${DB_DATABASE:-saire}
            MYSQL_USER: ${DB_USERNAME:-saire}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - saire

    redis:
        image: redis:7-alpine
        container_name: saire_redis
        restart: unless-stopped
        volumes:
            - redis_data:/data
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        networks:
            - saire

networks:
    saire:
        driver: bridge

volumes:
    mysql_data:
    redis_data:
    vendor_data:
    node_modules_data:
