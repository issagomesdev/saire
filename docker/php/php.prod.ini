; docker/php/php.prod.ini
; Ajustes de PHP para o ambiente de PRODUCAO.
; Prioriza performance e nao expor detalhes internos.

upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
max_input_vars = 5000

date.timezone = America/Recife

display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
expose_php = Off

; OPcache: como o codigo e imutavel dentro da imagem em producao,
; desativamos a checagem de timestamp (validate_timestamps=0) para
; ganho maximo de performance. Isso exige recriar o container
; (nao apenas `artisan cache:clear`) a cada deploy com codigo novo,
; o que ja e o fluxo padrao ao rodar `docker compose up -d --build`.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
