; docker/php/www.dev.conf
; Pool do PHP-FPM para DESENVOLVIMENTO. Sobrescreve docker/php/www.conf
; apenas no target "development" (ver Dockerfile).
;
; Roda como root em vez de "appuser": o codigo e um bind mount do host
; (docker-compose.yml), e em Docker Desktop (Windows/macOS) o "chown"
; feito no entrypoint nao tem efeito real sobre arquivos de bind mount
; — a camada de traducao do host sempre os apresenta com o mesmo dono.
; Um pool non-root nesse cenario fica sem permissao de escrita em
; storage/ e bootstrap/cache. Isso e seguro apenas porque e um
; ambiente local/descartavel; produção (docker/php/www.conf) mantem o
; usuario nao-root de verdade, pois la o codigo vem da imagem, nao de
; um bind mount.

[www]
user = root
group = root

listen = 9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

catch_workers_output = yes
decorate_workers_output = no

; Sem isso, o PHP-FPM descarta as variaveis de ambiente recebidas do
; docker-compose (DB_HOST, REDIS_HOST, etc.) antes de repassa-las ao
; Laravel, quebrando a leitura via env(). Este e um problema conhecido
; do PHP-FPM em containers e precisa ser desativado explicitamente.
clear_env = no
