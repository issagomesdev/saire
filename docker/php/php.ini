; docker/php/php.ini
; Ajustes de PHP para o ambiente de DESENVOLVIMENTO.
; Prioriza feedback rápido (erros visíveis, sem cache de opcode persistente).

upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

date.timezone = America/Recife

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Revalida o cache de opcode a cada requisição, refletindo mudanças
; de código imediatamente (necessário em dev por causa do bind mount).
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.memory_consumption = 128
