; docker/php/php.ini
; Ajustes de PHP para o ambiente de DESENVOLVIMENTO.
; Prioriza feedback rápido (erros visíveis, sem cache de opcode persistente).

upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

date.timezone = America/Recife

display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Revalida o cache de opcode a cada requisição, refletindo mudanças
; de código imediatamente (necessário em dev por causa do bind mount).
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.memory_consumption = 128

; Xdebug fica instalado mas OFF por padrão: mesmo sem debugger conectado,
; o modo default do Xdebug 3 (develop,debug,coverage) instrumenta toda
; chamada de função do PHP, adicionando segundos de overhead por request
; -- exatamente o que fazia as listagens do admin (DataTables) parecerem
; lentas mesmo com tabelas vazias, independente de query/banco. Para
; depurar de verdade, ligue por sessão sem editar este arquivo:
;   XDEBUG_MODE=debug docker compose up -d --force-recreate app
xdebug.mode = off
