; docker/php/www.conf
; Pool do PHP-FPM. Baseado no www.conf padrao da imagem oficial,
; com os ajustes necessarios para rodar em container.

[www]
user = appuser
group = appgroup

listen = 9000
listen.owner = appuser
listen.group = appgroup

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

catch_workers_output = yes
decorate_workers_output = no

; Sem isso, o PHP-FPM descarta as variaveis de ambiente recebidas do
; docker-compose (DB_HOST, REDIS_HOST, etc.) antes de repassa-las ao
; Laravel, quebrando a leitura via env(). Este e um problema conhecido
; do PHP-FPM em containers e precisa ser desativado explicitamente.
clear_env = no
